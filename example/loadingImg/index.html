<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仿知乎图片渐进加载</title>
  <link rel="stylesheet" href="/example/assets/css/loadingImg.css">
</head>
<body>
  <div class="img-box">
    <img
      src="/example/assets/img/WindermereHills_small.jpg"
      data-large="/example/assets/img/WindermereHills_big.jpg"
      class="unload-img"
    />
  </div>
  <script>
    window.onload = function () {
      var small = document.querySelector('.unload-img');
      var imgLarge = new Image();
      imgLarge.src = small.dataset.large;
      imgLarge.onload = function () {
        small.classList.add('img-loaded');
      };
      small.src = imgLarge.src;
    }
  </script>
</body>
</html>
