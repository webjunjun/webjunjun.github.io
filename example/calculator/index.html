<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>计算器</title>
  <link rel="stylesheet" href="/example/assets/css/calculator.css">
</head>
<body>
  <div class="main">
    <div class="cal_wrap">
      <div class="cal_inner">
        <div class="cal_top">0</div>
        <div class="cal_bottom">
          <ul>
            <li class="control-btn">C</li>
            <li class="control-btn">+/-</li>
            <li class="control-btn">%</li>
            <li class="operat-btn">÷</li>
          </ul>
          <ul>
            <li class="num-btn">7</li>
            <li class="num-btn">8</li>
            <li class="num-btn">9</li>
            <li class="operat-btn">×</li>
          </ul>
          <ul>
            <li class="num-btn">4</li>
            <li class="num-btn">5</li>
            <li class="num-btn">6</li>
            <li class="operat-btn">-</li>
          </ul>
          <ul>
            <li class="num-btn">1</li>
            <li class="num-btn">2</li>
            <li class="num-btn">3</li>
            <li class="operat-btn">+</li>
          </ul>
          <ul>
            <li class="num-btn double-size">0</li>
            <li class="num-btn">.</li>
            <li class="operat-btn">=</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.bootcss.com/jquery/1.12.4/jquery.min.js"></script>
  <script src="/example/assets/js/calculator.js"></script>
</body>
</html>
